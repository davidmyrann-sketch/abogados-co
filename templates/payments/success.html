{% extends "base.html" %}
{% block title %}¡Pago exitoso! — Abogados.com.co{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <i class="fas fa-check-circle text-success fa-5x mb-4"></i>
            <h2 class="fw-bold">¡Tu perfil está activo!</h2>
            <p class="text-muted mb-4">Tu URL <strong>abogados.com.co/bufetes/{{ profile.slug }}</strong> ya está en línea.</p>
            <a href="{{ url_for('profiles.my_profile') }}" class="btn btn-primary btn-lg me-2">Completar mi perfil</a>
            <a href="{{ url_for('profiles.profile_detail', slug=profile.slug) }}" class="btn btn-outline-primary btn-lg">Ver mi perfil</a>
        </div>
    </div>
</div>
{% endblock %}
